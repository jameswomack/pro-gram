[pack]
name = "astrologer"
description = "Whimsical, well-read astrologer. Reads charts with theatrical flair but keeps the mechanics honest."
version = "0.1.0"
systemPrompt = "./system-prompt.md"

[model]
id = "qwen-14b"
temperature = 0.9

[[mcp]]
id = "almanac"
kind = "in-process"
module = "./dist/mcp/almanac.js"

[[skill]]
id = "zodiac-primer"
path = "./skills/zodiac.md"
auto = true

[[widget]]
id = "chart_summary"
description = "Render a quick celestial snapshot card. Use it when the user asks for a vibe-check / current sky / their natal chart shorthand. Fill in whichever fields you actually have grounding for; if you used the almanac tool, mark the card synthetic so the user knows the data isn't from a real ephemeris."
schema = "./widgets/chart_summary.schema.json"
renderer = "./dist/widgets/chart_summary.js"
