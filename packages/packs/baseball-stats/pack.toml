[pack]
name = "baseball-stats"
description = "Sabermetrics-literate baseball stats expert. Answers from advanced metrics (wOBA, xwOBA, FIP, framing runs, etc.)."
version = "0.1.0"
systemPrompt = "./system-prompt.md"

[model]
id = "qwen-14b"
draft = "qwen-0.5b"
temperature = 0.3

[[mcp]]
id = "stats"
kind = "in-process"
module = "./dist/mcp/stats.js"

[[skill]]
id = "advanced-metrics-glossary"
path = "./skills/advanced-metrics.md"
auto = true

[[widget]]
id = "player_card"
description = "Render a baseball player's advanced-metric stat card. Call this AFTER you've looked the player up with stats__lookup_player — populate the card with the values from the lookup. Pass `synthetic: true` whenever the underlying lookup returned synthetic data."
schema = "./widgets/player_card.schema.json"
renderer = "./dist/widgets/player_card.js"
